<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GlanceChat — Modern Messenger</title>
  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
  <!-- Emoji Picker CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/emoji-mart@5.5.2/css/emoji-mart.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 20% 30%, #0b1120, #030712);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    /* ----- GLASS AUTH PANEL (ULTRA SMOOTH) ----- */
    .auth-container {
      width: 100%;
      max-width: 460px;
      padding: 24px;
      animation: fadeSlideUp 0.65s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .glass-auth {
      background: rgba(18, 25, 45, 0.65);
      backdrop-filter: blur(18px);
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 0.5px rgba(255, 255, 255, 0.1) inset;
      padding: 2.2rem 2rem;
      transition: transform 0.2s;
    }

    .glass-auth h2 {
      font-size: 2rem;
      font-weight: 600;
      background: linear-gradient(135deg, #FFFFFF, #b9c8ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      margin-bottom: 0.5rem;
    }

    .welcome-sub {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 2rem;
      font-weight: 400;
    }

    .input-group {
      margin-bottom: 1.2rem;
    }

    .glass-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 14px 18px;
      border-radius: 1.5rem;
      font-size: 1rem;
      color: white;
      font-weight: 500;
      transition: all 0.25s;
      outline: none;
      backdrop-filter: blur(4px);
    }

    .glass-input:focus {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.15);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
    }

    .glass-input::placeholder {
      color: #7f8ea3;
      font-weight: 400;
    }

    .btn-group {
      display: flex;
      gap: 14px;
      margin-top: 28px;
    }

    .btn-primary, .btn-secondary {
      flex: 1;
      padding: 12px 0;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.95rem;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .btn-primary {
      background: linear-gradient(105deg, #3b82f6, #2563eb);
      color: white;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(4px);
      color: #e2e8f0;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    /* ----- MAIN APP (GLASS UI) ----- */
    .app-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .glass-app {
      width: 1300px;
      max-width: 98vw;
      height: 90vh;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      overflow: hidden;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4);
      transition: all 0.2s;
    }

    /* Sidebar modern */
    .sidebar-modern {
      width: 320px;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      padding: 20px 0;
    }

    .sidebar-header {
      padding: 0 20px 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 18px;
    }

    .sidebar-header h2 {
      color: white;
      font-weight: 600;
      font-size: 1.6rem;
      background: linear-gradient(120deg, #fff, #9bbaff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .user-badge {
      font-size: 0.75rem;
      color: #a0c4ff;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
      word-break: break-all;
    }

    .users-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .user-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(2px);
      padding: 12px 14px;
      border-radius: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      color: #f0f3fa;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
    }

    .user-card:hover {
      background: rgba(59, 130, 246, 0.25);
      border-color: rgba(59, 130, 246, 0.6);
      transform: translateX(4px);
    }

    .user-card.active-chat {
      background: linear-gradient(95deg, #2563eb40, #3b82f620);
      border-left: 3px solid #3b82f6;
    }

    .unread-dot {
      width: 10px;
      height: 10px;
      background-color: #22c55e;
      border-radius: 50%;
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      box-shadow: 0 0 6px #22c55e;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.5; transform: translateY(-50%) scale(0.8); }
      100% { opacity: 1; transform: translateY(-50%) scale(1.2); }
    }

    .avatar-placeholder {
      width: 42px;
      height: 42px;
      background: linear-gradient(145deg, #3b82f6, #1e40af);
      border-radius: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.1rem;
      text-transform: uppercase;
      color: white;
      flex-shrink: 0;
    }

    .user-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .user-name {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .last-msg-preview {
      font-size: 0.7rem;
      color: #94a3b8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }

    /* Chat section */
    .chat-master {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header-gloss {
      padding: 18px 24px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .chat-header-gloss h3 {
      color: white;
      font-weight: 600;
      font-size: 1.35rem;
    }

    .chat-header-gloss p {
      color: #8ca3cf;
      font-size: 0.75rem;
    }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    .bubble {
      max-width: 70%;
      padding: 10px 16px;
      border-radius: 24px;
      font-size: 0.95rem;
      line-height: 1.4;
      position: relative;
      animation: fadeInMsg 0.2s ease;
      word-wrap: break-word;
    }

    .bubble-mine {
      background: linear-gradient(115deg, #3b82f6, #2563eb);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 6px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
    }

    .bubble-other {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      color: #f1f5f9;
      align-self: flex-start;
      border-bottom-left-radius: 6px;
      border: 0.5px solid rgba(255,255,255,0.2);
    }

    .seen-indicator {
      font-size: 0.7rem;
      margin-top: 4px;
      text-align: right;
      letter-spacing: 0.5px;
      opacity: 0.8;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
    }

    .typing-status {
      padding: 6px 24px;
      font-size: 0.75rem;
      color: #a5b9e8;
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-bar {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
      padding: 12px 20px;
      display: flex;
      gap: 10px;
      border-top: 1px solid rgba(255,255,255,0.1);
      position: relative;
    }

    .input-message {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 2.5rem;
      padding: 12px 18px;
      color: white;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s;
    }

    .input-message:focus {
      background: rgba(255,255,255,0.18);
      border-color: #3b82f6;
    }

    .emoji-btn, .send-btn {
      background: #3b82f6;
      border: none;
      width: 46px;
      height: 46px;
      border-radius: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      color: white;
    }

    .emoji-btn {
      background: rgba(255,255,255,0.15);
    }

    .emoji-btn:hover, .send-btn:hover {
      background: #2563eb;
      transform: scale(1.02);
    }

    /* Emoji Picker Container */
    .emoji-picker-container {
      position: absolute;
      bottom: 70px;
      left: 20px;
      z-index: 100;
      display: none;
      background: rgba(0,0,0,0.9);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .emoji-picker-container.show {
      display: block;
    }

    /* scroll */
    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: #3b82f680;
      border-radius: 10px;
    }

    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(18px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInMsg {
      from { opacity: 0; transform: translateY(8px);}
      to { opacity: 1; transform: translateY(0);}
    }

    .empty-chat {
      text-align: center;
      color: #8da3cf;
      margin-top: 40px;
      font-weight: 400;
    }

    /* Search Dialog */
    .search-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .search-modal-content {
      background: rgba(20, 30, 50, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 2rem;
      padding: 2rem;
      width: 90%;
      max-width: 400px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .search-modal-content h3 {
      color: white;
      margin-bottom: 1rem;
    }

    .search-modal-content input {
      width: 100%;
      padding: 12px;
      border-radius: 1rem;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
      margin-bottom: 1rem;
    }

    .search-modal-content button {
      padding: 10px 20px;
      border-radius: 2rem;
      border: none;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    @media (max-width: 700px) {
      .sidebar-modern { width: 260px; }
      .bubble { max-width: 85%; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, doc, getDocs, addDoc, query, orderBy, onSnapshot, updateDoc, setDoc, getDoc, deleteDoc, where, limit, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    
    // Load Emoji Mart dynamically
    const emojiMartScript = document.createElement('script');
    emojiMartScript.src = "https://cdn.jsdelivr.net/npm/emoji-mart@5.5.2/dist/index.js";
    document.head.appendChild(emojiMartScript);

    // Firebase Config (Replace with yours)
    const firebaseConfig = {
      apiKey: "AIzaSyBXKKQZTCJpurD9oVkdCvFElAgXwaL2hsc",
      authDomain: "chat-app-665ba.firebaseapp.com",
      projectId: "chat-app-665ba",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    
    let app, auth, db;
    let firebaseReady = false;
    try {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      firebaseReady = true;
    } catch(e) { console.warn(e); }
    
    // State
    let currentUserEmail = null;
    let currentUserId = null;
    let currentUserName = null;
    let selectedUserEmail = null;
    let selectedUserName = null;
    let chatsData = [];
    let typingTimeout = null;
    let unsubscribeMessages = null;
    let unsubscribeTyping = null;
    let unsubscribeRoomsListener = null;
    let emojiPicker = null;
    
    const root = document.getElementById('root');
    
    function renderAuthPage() {
      root.innerHTML = `
        <div class="auth-container">
          <div class="glass-auth">
            <h2>✨ GlanceChat</h2>
            <div class="welcome-sub">Find friends by username • Send emojis • Real-time</div>
            <div class="input-group"><input type="text" id="authUsername" class="glass-input" placeholder="Username (e.g., john_doe)"></div>
            <div class="input-group"><input type="email" id="authEmail" class="glass-input" placeholder="Email address" autocomplete="email"></div>
            <div class="input-group"><input type="password" id="authPassword" class="glass-input" placeholder="Password" autocomplete="current-password"></div>
            <div class="btn-group">
              <button class="btn-primary" id="loginBtn">Login →</button>
              <button class="btn-secondary" id="signupBtn">Sign up</button>
            </div>
            <div id="authMessage" style="color:#f97316; font-size:0.8rem; margin-top:18px; text-align:center;"></div>
          </div>
        </div>
      `;
      document.getElementById('loginBtn')?.addEventListener('click', () => handleAuth('login'));
      document.getElementById('signupBtn')?.addEventListener('click', () => handleAuth('signup'));
    }
    
    async function handleAuth(type) {
      if (!firebaseReady) { showAuthMsg("⚠️ Firebase config missing"); return; }
      const username = document.getElementById('authUsername')?.value.trim();
      const email = document.getElementById('authEmail').value.trim();
      const pwd = document.getElementById('authPassword').value;
      
      if (type === 'signup' && !username) {
        showAuthMsg("Username required for signup");
        return;
      }
      if (!email || !pwd) { showAuthMsg("Email & password required"); return; }
      
      try {
        if (type === 'signup') {
          // Check if username already exists
          const usernameQuery = query(collection(db, "users"), where("username", "==", username));
          const existingUsername = await getDocs(usernameQuery);
          if (!existingUsername.empty) {
            showAuthMsg("Username already taken. Choose another.");
            return;
          }
          
          const cred = await createUserWithEmailAndPassword(auth, email, pwd);
          // Update display name in Auth
          await updateProfile(cred.user, { displayName: username });
          
          // Check if email already exists in Firestore
          const emailQuery = query(collection(db, "users"), where("email", "==", cred.user.email));
          const existingEmail = await getDocs(emailQuery);
          if (existingEmail.empty) {
            await setDoc(doc(db, "users", cred.user.uid), { 
              email: cred.user.email, 
              username: username,
              name: username,
              uid: cred.user.uid, 
              createdAt: Date.now()
            });
          }
          showAuthMsg("✅ Signup success! Logging in...");
          await signInWithEmailAndPassword(auth, email, pwd);
        } else {
          await signInWithEmailAndPassword(auth, email, pwd);
        }
      } catch (err) {
        showAuthMsg(err.message);
      }
    }
    
    function showAuthMsg(msg) {
      const el = document.getElementById('authMessage');
      if (el) el.innerText = msg;
    }
    
    async function ensureUniqueUserDoc(user) {
      const userQuery = query(collection(db, "users"), where("email", "==", user.email));
      const existing = await getDocs(userQuery);
      if (existing.empty) {
        const username = user.displayName || user.email.split('@')[0];
        await setDoc(doc(db, "users", user.uid), { 
          email: user.email, 
          username: username,
          name: username,
          uid: user.uid 
        });
      }
    }
    
    // Search user by username (not email)
    async function searchUserByUsername() {
      return new Promise((resolve) => {
        const modal = document.createElement('div');
        modal.className = 'search-modal';
        modal.innerHTML = `
          <div class="search-modal-content">
            <h3>🔍 Find User by Username</h3>
            <input type="text" id="searchUsernameInput" placeholder="Enter username (e.g., john_doe)" autocomplete="off">
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
              <button id="searchCancelBtn">Cancel</button>
              <button id="searchConfirmBtn" style="background: #22c55e;">Search</button>
            </div>
            <div id="searchResultMsg" style="margin-top: 12px; font-size: 0.8rem; color: #f97316;"></div>
          </div>
        `;
        document.body.appendChild(modal);
        
        const searchInput = modal.querySelector('#searchUsernameInput');
        const confirmBtn = modal.querySelector('#searchConfirmBtn');
        const cancelBtn = modal.querySelector('#searchCancelBtn');
        const resultMsg = modal.querySelector('#searchResultMsg');
        
        searchInput.focus();
        
        const doSearch = async () => {
          const username = searchInput.value.trim().toLowerCase();
          if (!username) {
            resultMsg.innerText = "Please enter a username";
            return;
          }
          if (username === currentUserName) {
            resultMsg.innerText = "You cannot chat with yourself";
            return;
          }
          
          const usersRef = collection(db, "users");
          const q = query(usersRef, where("username", "==", username));
          const snap = await getDocs(q);
          
          if (snap.empty) {
            resultMsg.innerText = "❌ No user found with that username";
            return;
          }
          
          const userData = snap.docs[0].data();
          modal.remove();
          resolve({ email: userData.email, name: userData.username || userData.name });
        };
        
        confirmBtn.onclick = doSearch;
        cancelBtn.onclick = () => { modal.remove(); resolve(null); };
        searchInput.onkeypress = (e) => { if (e.key === 'Enter') doSearch(); };
      });
    }
    
    async function startNewChatWithUsername() {
      const result = await searchUserByUsername();
      if (!result) return;
      
      const { email, name } = result;
      
      // Check if chat already exists
      const userChatsRef = collection(db, "user_chats");
      const checkQuery = query(userChatsRef, where("participants", "array-contains", currentUserEmail));
      const existing = await getDocs(checkQuery);
      let exists = false;
      existing.forEach(d => { if (d.data().participants.includes(email)) exists = true; });
      
      if (!exists) {
        await addDoc(collection(db, "user_chats"), {
          participants: [currentUserEmail, email],
          otherName: name,
          otherUsername: name,
          createdAt: Date.now()
        });
      }
      await loadChatsList();
      selectChatUser(email, name);
    }
    
    async function loadChatsList() {
      if (!db || !currentUserEmail) return;
      const container = document.getElementById('usersListContainer');
      if (!container) return;
      
      const allChats = new Map();
      const chatRoomsQuery = query(collection(db, "user_chats"), where("participants", "array-contains", currentUserEmail));
      const chatRoomsSnap = await getDocs(chatRoomsQuery);
      
      for (const roomDoc of chatRoomsSnap.docs) {
        const data = roomDoc.data();
        const otherEmail = data.participants.find(e => e !== currentUserEmail);
        if (!otherEmail) continue;
        
        const otherName = data.otherName || otherEmail.split('@')[0];
        const chatId = [currentUserEmail, otherEmail].sort().join('_');
        
        const messagesRef = collection(db, "chats", chatId, "messages");
        const lastMsgQuery = query(messagesRef, orderBy("timestamp", "desc"), limit(1));
        const lastMsgSnap = await getDocs(lastMsgQuery);
        
        let lastMessage = "No messages yet";
        let lastTimestamp = 0;
        if (!lastMsgSnap.empty) {
          const msg = lastMsgSnap.docs[0].data();
          lastMessage = msg.text.length > 35 ? msg.text.substring(0, 35) + "..." : msg.text;
          lastTimestamp = msg.timestamp || 0;
        }
        
        const unreadQuery = query(messagesRef, where("sender", "==", otherEmail), where("seen", "==", false));
        const unreadSnap = await getDocs(unreadQuery);
        const unreadCount = unreadSnap.size;
        
        allChats.set(otherEmail, {
          email: otherEmail,
          name: otherName,
          lastMessage: lastMessage,
          lastTimestamp: lastTimestamp,
          unreadCount: unreadCount
        });
      }
      
      chatsData = Array.from(allChats.values());
      chatsData.sort((a, b) => (b.lastTimestamp || 0) - (a.lastTimestamp || 0));
      
      if (chatsData.length === 0) {
        container.innerHTML = `<div style="color:#aaa; text-align:center; padding:20px;">✨ No chats yet<br>🔍 Click "New Chat" to find friends by username</div>`;
        return;
      }
      
      container.innerHTML = '';
      chatsData.forEach(chat => {
        const div = document.createElement('div');
        div.className = `user-card ${selectedUserEmail === chat.email ? 'active-chat' : ''}`;
        const initial = chat.name.charAt(0).toUpperCase();
        div.innerHTML = `
          <div class="avatar-placeholder">${initial}</div>
          <div class="user-info">
            <div class="user-name">${escapeHtml(chat.name)}</div>
            <div class="last-msg-preview">${escapeHtml(chat.lastMessage)}</div>
          </div>
          ${chat.unreadCount > 0 && selectedUserEmail !== chat.email ? '<div class="unread-dot"></div>' : ''}
        `;
        div.addEventListener('click', () => {
          markMessagesAsRead(chat.email);
          selectChatUser(chat.email, chat.name);
        });
        container.appendChild(div);
      });
    }
    
    async function markMessagesAsRead(otherEmail) {
      if (!currentUserEmail || !otherEmail) return;
      const chatId = [currentUserEmail, otherEmail].sort().join('_');
      const messagesRef = collection(db, "chats", chatId, "messages");
      const unreadQuery = query(messagesRef, where("sender", "==", otherEmail), where("seen", "==", false));
      const unreadSnap = await getDocs(unreadQuery);
      const batch = writeBatch(db);
      unreadSnap.forEach(docSnap => {
        batch.update(docSnap.ref, { seen: true });
      });
      await batch.commit();
      loadChatsList();
    }
    
    function listenForChatUpdates() {
      if (!db || !currentUserEmail) return;
      const chatRoomsQuery = query(collection(db, "user_chats"), where("participants", "array-contains", currentUserEmail));
      return onSnapshot(chatRoomsQuery, () => { loadChatsList(); });
    }
    
    function selectChatUser(email, name) {
      if (selectedUserEmail === email) return;
      if (unsubscribeMessages) unsubscribeMessages();
      if (unsubscribeTyping) unsubscribeTyping();
      
      selectedUserEmail = email;
      selectedUserName = name;
      
      loadChatsList();
      document.getElementById('chatTargetName').innerText = name;
      document.getElementById('chatStatus').innerHTML = '🟢 Connected • real-time';
      document.getElementById('messageInputField').disabled = false;
      loadMessagesRealtime();
      listenTypingIndicator();
    }
    
    function getChatRoomId(userA, userB) {
      return [userA, userB].sort().join('_');
    }
    
    async function sendMessageHandler() {
      const input = document.getElementById('messageInputField');
      const text = input.value.trim();
      if (!text || !selectedUserEmail || !currentUserEmail) return;
      const chatRoomId = getChatRoomId(currentUserEmail, selectedUserEmail);
      const messagesRef = collection(db, "chats", chatRoomId, "messages");
      await addDoc(messagesRef, {
        text: text,
        sender: currentUserEmail,
        seen: false,
        timestamp: Date.now()
      });
      input.value = '';
      scrollChatBottom();
      
      const userChatsRef = collection(db, "user_chats");
      const checkQuery = query(userChatsRef, where("participants", "array-contains", currentUserEmail));
      const snap = await getDocs(checkQuery);
      let found = false;
      snap.forEach(d => { if (d.data().participants.includes(selectedUserEmail)) found = true; });
      if (!found) {
        await addDoc(collection(db, "user_chats"), {
          participants: [currentUserEmail, selectedUserEmail],
          otherName: selectedUserName,
          createdAt: Date.now()
        });
      }
      loadChatsList();
    }
    
    function loadMessagesRealtime() {
      if (!selectedUserEmail || !currentUserEmail) return;
      const chatRoomId = getChatRoomId(currentUserEmail, selectedUserEmail);
      const q = query(collection(db, "chats", chatRoomId, "messages"), orderBy("timestamp", "asc"));
      unsubscribeMessages = onSnapshot(q, (snapshot) => {
        const msgPanel = document.getElementById('chatMessagesPanel');
        if (!msgPanel) return;
        msgPanel.innerHTML = '';
        if (snapshot.empty) {
          msgPanel.innerHTML = '<div class="empty-chat">✨ Say hi! Start the conversation ✨</div>';
        } else {
          snapshot.forEach(docSnap => {
            const msg = docSnap.data();
            const isMine = msg.sender === currentUserEmail;
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = `bubble ${isMine ? 'bubble-mine' : 'bubble-other'}`;
            bubbleDiv.innerHTML = `<div>${escapeHtml(msg.text)}</div>`;
            if (isMine) {
              const seenSpan = document.createElement('div');
              seenSpan.className = 'seen-indicator';
              seenSpan.innerHTML = msg.seen ? '✔✔ Seen' : '✔ Sent';
              bubbleDiv.appendChild(seenSpan);
            } else {
              if (!msg.seen) {
                updateDoc(docSnap.ref, { seen: true }).catch(console.warn);
                loadChatsList();
              }
            }
            msgPanel.appendChild(bubbleDiv);
          });
        }
        scrollChatBottom();
        loadChatsList();
      });
    }
    
    // Emoji Picker Setup
    function setupEmojiPicker() {
      const emojiBtn = document.getElementById('emojiBtn');
      const pickerContainer = document.getElementById('emojiPickerContainer');
      const messageInput = document.getElementById('messageInputField');
      
      if (!emojiBtn || !pickerContainer) return;
      
      emojiBtn.addEventListener('click', () => {
        pickerContainer.classList.toggle('show');
      });
      
      // Close picker when clicking outside
      document.addEventListener('click', (e) => {
        if (!pickerContainer.contains(e.target) && e.target !== emojiBtn) {
          pickerContainer.classList.remove('show');
        }
      });
      
      // Wait for Emoji Mart to load
      const waitForEmojiMart = setInterval(() => {
        if (window.emojiMart) {
          clearInterval(waitForEmojiMart);
          const { Picker } = window.emojiMart;
          const picker = new Picker({
            onEmojiSelect: (emoji) => {
              messageInput.value += emoji.native;
              messageInput.focus();
              pickerContainer.classList.remove('show');
            },
            theme: 'dark',
            set: 'twitter',
            showPreview: false,
            showSkinTones: true
          });
          pickerContainer.appendChild(picker);
        }
      }, 100);
    }
    
    function handleTyping() {
      if (!selectedUserEmail || !currentUserEmail) return;
      const chatRoomId = getChatRoomId(currentUserEmail, selectedUserEmail);
      const docId = `${chatRoomId}_${currentUserEmail}`;
      setDoc(doc(db, "typing_indicators", docId), {
        user: currentUserEmail,
        chatId: chatRoomId,
        timestamp: Date.now()
      }).catch(console.warn);
      if (typingTimeout) clearTimeout(typingTimeout);
      typingTimeout = setTimeout(async () => {
        await deleteDoc(doc(db, "typing_indicators", docId)).catch(()=>{});
      }, 1500);
    }
    
    function listenTypingIndicator() {
      if (!selectedUserEmail || !currentUserEmail) return;
      const chatRoomId = getChatRoomId(currentUserEmail, selectedUserEmail);
      const typingQuery = query(collection(db, "typing_indicators"), where("chatId", "==", chatRoomId));
      unsubscribeTyping = onSnapshot(typingQuery, (snap) => {
        let isTyping = false;
        snap.forEach(docSnap => {
          const data = docSnap.data();
          if (data.user !== currentUserEmail && (Date.now() - data.timestamp) < 2000) {
            isTyping = true;
          }
        });
        const typingDiv = document.getElementById('typingIndicatorArea');
        if (typingDiv) {
          typingDiv.innerHTML = isTyping ? `✍️ ${selectedUserName} is typing...` : '';
        }
      });
    }
    
    function scrollChatBottom() {
      setTimeout(() => {
        const panel = document.getElementById('chatMessagesPanel');
        if (panel) panel.scrollTop = panel.scrollHeight;
      }, 50);
    }
    
    function escapeHtml(str) { 
      if(!str) return '';
      return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    function renderApp() {
      root.innerHTML = `
        <div class="app-container">
          <div class="glass-app">
            <div class="sidebar-modern">
              <div class="sidebar-header">
                <h2>Chatter</h2>
                <div class="user-badge"><span class="material-symbols-rounded" style="font-size:18px;">account_circle</span> @${escapeHtml(currentUserName || currentUserEmail?.split('@')[0])}</div>
                <button id="logoutBtn" style="background: none; border:1px solid rgba(255,255,255,0.3); margin-top:12px; padding:6px 14px; border-radius:40px; color:#ddd; cursor:pointer; font-size:12px; width:100%;">🚪 Logout</button>
                <button id="addChatBtn" style="background: #3b82f6; border:none; margin-top:12px; padding:8px; border-radius:40px; color:white; cursor:pointer; font-size:12px; width:100%;">➕ New Chat (by username)</button>
              </div>
              <div class="users-list" id="usersListContainer">
                <div style="color:#aaa; text-align:center; padding:20px;">Loading chats...</div>
              </div>
            </div>
            <div class="chat-master">
              <div class="chat-header-gloss" id="chatHeaderDynamic">
                <h3 id="chatTargetName">✨ Select a friend</h3>
                <p id="chatStatus">Tap user to start conversation</p>
              </div>
              <div class="messages-area" id="chatMessagesPanel">
                <div class="empty-chat">💬 No conversation yet</div>
              </div>
              <div id="typingIndicatorArea" class="typing-status"></div>
              <div class="input-bar">
                <button id="emojiBtn" class="emoji-btn"><span class="material-symbols-rounded">sentiment_satisfied</span></button>
                <input type="text" id="messageInputField" class="input-message" placeholder="Type a message..." autocomplete="off" disabled>
                <button id="sendMsgBtn" class="send-btn"><span class="material-symbols-rounded">send</span></button>
              </div>
              <div id="emojiPickerContainer" class="emoji-picker-container"></div>
            </div>
          </div>
        </div>
      `;
      
      document.getElementById('logoutBtn')?.addEventListener('click', async () => { await signOut(auth); });
      document.getElementById('sendMsgBtn')?.addEventListener('click', () => sendMessageHandler());
      document.getElementById('addChatBtn')?.addEventListener('click', () => startNewChatWithUsername());
      const inputField = document.getElementById('messageInputField');
      inputField?.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessageHandler(); });
      inputField?.addEventListener('input', () => handleTyping());
      
      loadChatsList();
      if (unsubscribeRoomsListener) unsubscribeRoomsListener();
      unsubscribeRoomsListener = listenForChatUpdates();
      setupEmojiPicker();
    }
    
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUserEmail = user.email;
        currentUserId = user.uid;
        currentUserName = user.displayName || user.email.split('@')[0];
        await ensureUniqueUserDoc(user);
        renderApp();
      } else {
        if (unsubscribeMessages) unsubscribeMessages();
        if (unsubscribeTyping) unsubscribeTyping();
        if (unsubscribeRoomsListener) unsubscribeRoomsListener();
        currentUserEmail = null;
        selectedUserEmail = null;
        renderAuthPage();
      }
    });
    
    if (!firebaseReady) {
      renderAuthPage();
      showAuthMsg("⚠️ Please configure Firebase credentials");
    } else {
      renderAuthPage();
    }
  </script>
</body>
</html>
