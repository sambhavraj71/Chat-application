<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GlanceChat — Private Messenger</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 20% 30%, #0b1120, #030712);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* GLASS AUTH PANEL */
    .auth-container {
      width: 100%;
      max-width: 460px;
      padding: 24px;
      animation: fadeSlideUp 0.65s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .glass-auth {
      background: rgba(18, 25, 45, 0.65);
      backdrop-filter: blur(18px);
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 0.5px rgba(255, 255, 255, 0.1) inset;
      padding: 2.2rem 2rem;
    }

    .glass-auth h2 {
      font-size: 2rem;
      font-weight: 600;
      background: linear-gradient(135deg, #FFFFFF, #b9c8ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }

    .welcome-sub {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .glass-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 14px 18px;
      border-radius: 1.5rem;
      font-size: 1rem;
      color: white;
      outline: none;
      transition: all 0.25s;
    }

    .glass-input:focus {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.15);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
    }

    .glass-input::placeholder {
      color: #7f8ea3;
    }

    .btn-group {
      display: flex;
      gap: 14px;
      margin-top: 28px;
    }

    .btn-primary, .btn-secondary {
      flex: 1;
      padding: 12px 0;
      border-radius: 2rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .btn-primary {
      background: linear-gradient(105deg, #3b82f6, #2563eb);
      color: white;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #e2e8f0;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    /* MAIN APP */
    .app-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .glass-app {
      width: 1300px;
      max-width: 98vw;
      height: 90vh;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      overflow: hidden;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4);
    }

    /* Sidebar - only shows existing chats */
    .sidebar-modern {
      width: 320px;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      padding: 20px 0;
    }

    .sidebar-header {
      padding: 0 20px 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 18px;
    }

    .sidebar-header h2 {
      color: white;
      font-weight: 600;
      font-size: 1.6rem;
      background: linear-gradient(120deg, #fff, #9bbaff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .user-badge {
      font-size: 0.8rem;
      color: #a0c4ff;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Search / Add user section */
    .search-section {
      padding: 0 16px 16px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 16px;
    }

    .search-box {
      display: flex;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 2rem;
      padding: 4px 4px 4px 16px;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      padding: 10px 0;
      outline: none;
      font-size: 0.85rem;
    }

    .search-box input::placeholder {
      color: #7f8ea3;
    }

    .search-btn {
      background: #3b82f6;
      border: none;
      border-radius: 2rem;
      padding: 6px 16px;
      color: white;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.8rem;
      transition: 0.2s;
    }

    .search-btn:hover {
      background: #2563eb;
    }

    .search-result {
      margin-top: 12px;
      background: rgba(59, 130, 246, 0.2);
      border-radius: 1rem;
      padding: 10px 12px;
      display: none;
      align-items: center;
      justify-content: space-between;
      animation: fadeSlideUp 0.2s ease;
    }

    .search-result.show {
      display: flex;
    }

    .search-user-info {
      color: white;
      font-size: 0.85rem;
    }

    .add-chat-btn {
      background: #22c55e;
      border: none;
      border-radius: 1.5rem;
      padding: 5px 12px;
      color: white;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .chats-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-item {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 1.2rem;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      color: #f0f3fa;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-item:hover {
      background: rgba(59, 130, 246, 0.25);
      border-color: rgba(59, 130, 246, 0.6);
    }

    .chat-item.active-chat {
      background: linear-gradient(95deg, #2563eb40, #3b82f620);
      border-left: 3px solid #3b82f6;
    }

    .chat-avatar {
      width: 42px;
      height: 42px;
      background: linear-gradient(145deg, #3b82f6, #1e40af);
      border-radius: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      text-transform: uppercase;
      color: white;
    }

    .chat-info {
      flex: 1;
    }

    .chat-name {
      font-weight: 600;
      font-size: 1rem;
    }

    .chat-preview {
      font-size: 0.7rem;
      color: #94a3b8;
      margin-top: 2px;
    }

    .empty-chats {
      text-align: center;
      color: #7f8ea3;
      padding: 30px 20px;
      font-size: 0.85rem;
    }

    /* Chat area */
    .chat-master {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header-gloss {
      padding: 18px 24px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .chat-header-gloss h3 {
      color: white;
      font-weight: 600;
      font-size: 1.35rem;
    }

    .chat-header-gloss p {
      color: #8ca3cf;
      font-size: 0.75rem;
    }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 70%;
      padding: 10px 16px;
      border-radius: 24px;
      font-size: 0.95rem;
      line-height: 1.4;
      animation: fadeInMsg 0.2s ease;
      word-wrap: break-word;
    }

    .bubble-mine {
      background: linear-gradient(115deg, #3b82f6, #2563eb);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 6px;
    }

    .bubble-other {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      color: #f1f5f9;
      align-self: flex-start;
      border-bottom-left-radius: 6px;
    }

    .seen-indicator {
      font-size: 0.7rem;
      margin-top: 4px;
      text-align: right;
      opacity: 0.8;
    }

    .typing-status {
      padding: 6px 24px;
      font-size: 0.75rem;
      color: #a5b9e8;
      font-style: italic;
    }

    .input-bar {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
      padding: 16px 20px;
      display: flex;
      gap: 12px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .input-message {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 2.5rem;
      padding: 12px 20px;
      color: white;
      font-size: 0.95rem;
      outline: none;
    }

    .input-message:focus {
      background: rgba(255,255,255,0.18);
      border-color: #3b82f6;
    }

    .send-btn {
      background: #3b82f6;
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #3b82f680; border-radius: 10px; }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInMsg {
      from { opacity: 0; transform: translateY(8px);}
      to { opacity: 1; transform: translateY(0);}
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, doc, getDocs, addDoc, query, orderBy, onSnapshot, updateDoc, setDoc, getDoc, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // ========== REPLACE WITH YOUR FIREBASE CONFIG ==========
    const firebaseConfig = {
      apiKey: "AIzaSyBXKKQZTCJpurD9oVkdCvFElAgXwaL2hsc",
      authDomain: "chat-app-665ba.firebaseapp.com",
      projectId: "chat-app-665ba",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    
    let app, auth, db;
    let firebaseReady = false;
    try {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      firebaseReady = true;
    } catch(e) { console.warn(e); }
    
    // State
    let currentUserEmail = null;
    let currentUserId = null;
    let selectedUserEmail = null;
    let selectedUserName = null;
    let myChats = []; // { email, name, lastMessage }
    let unsubscribeMessages = null;
    let unsubscribeTyping = null;
    let typingTimeout = null;
    
    const root = document.getElementById('root');
    
    function renderAuthPage() {
      root.innerHTML = `
        <div class="auth-container">
          <div class="glass-auth">
            <h2>✨ GlanceChat</h2>
            <div class="welcome-sub">Private • Secure • Real-time</div>
            <div class="input-group"><input type="email" id="authEmail" class="glass-input" placeholder="Email address"></div>
            <div class="input-group"><input type="password" id="authPassword" class="glass-input" placeholder="Password"></div>
            <div class="btn-group">
              <button class="btn-primary" id="loginBtn">Login →</button>
              <button class="btn-secondary" id="signupBtn">Sign up</button>
            </div>
            <div id="authMessage" style="color:#f97316; font-size:0.8rem; margin-top:18px; text-align:center;"></div>
          </div>
        </div>
      `;
      document.getElementById('loginBtn')?.addEventListener('click', () => handleAuth('login'));
      document.getElementById('signupBtn')?.addEventListener('click', () => handleAuth('signup'));
    }
    
    async function handleAuth(type) {
      if (!firebaseReady) { showAuthMsg("⚠️ Configure Firebase first"); return; }
      const email = document.getElementById('authEmail').value.trim();
      const pwd = document.getElementById('authPassword').value;
      if (!email || !pwd) { showAuthMsg("Email & password required"); return; }
      try {
        if (type === 'signup') {
          const cred = await createUserWithEmailAndPassword(auth, email, pwd);
          const displayName = email.split('@')[0];
          await setDoc(doc(db, "users", cred.user.uid), { email: cred.user.email, name: displayName, uid: cred.user.uid, createdAt: Date.now() });
          showAuthMsg("✅ Signup success!");
          await signInWithEmailAndPassword(auth, email, pwd);
        } else {
          await signInWithEmailAndPassword(auth, email, pwd);
        }
      } catch (err) {
        showAuthMsg(err.message);
      }
    }
    
    function showAuthMsg(msg) {
      const el = document.getElementById('authMessage');
      if (el) el.innerText = msg;
    }
    
    // Get or create user doc
    async function ensureUserDoc(user) {
      const userRef = doc(db, "users", user.uid);
      const snap = await getDoc(userRef);
      if (!snap.exists()) {
        await setDoc(userRef, { email: user.email, name: user.email.split('@')[0], uid: user.uid });
      }
      return userRef;
    }
    
    // Load ONLY chats that have messages between current user and others
    async function loadMyChats() {
      if (!db || !currentUserEmail) return;
      const container = document.getElementById('chatsListContainer');
      if (!container) return;
      
      // Query all chat rooms where current user participated
      // Approach: find all chat subcollections that contain messages from current user
      // Instead of scanning all, we'll track chats from "user_chats" collection
      const userChatsRef = collection(db, "user_chats");
      const q = query(userChatsRef, where("participants", "array-contains", currentUserEmail));
      const snapshot = await getDocs(q);
      
      const chatMap = new Map();
      for (const docSnap of snapshot.docs) {
        const data = docSnap.data();
        const otherEmail = data.participants.find(e => e !== currentUserEmail);
        if (otherEmail) {
          chatMap.set(otherEmail, { email: otherEmail, name: data.otherName || otherEmail.split('@')[0] });
        }
      }
      
      myChats = Array.from(chatMap.values());
      
      if (myChats.length === 0) {
        container.innerHTML = `<div class="empty-chats">✨ No conversations yet<br>🔍 Search for a user to start chatting</div>`;
        return;
      }
      
      container.innerHTML = '';
      for (const chat of myChats) {
        const div = document.createElement('div');
        div.className = `chat-item ${selectedUserEmail === chat.email ? 'active-chat' : ''}`;
        const initial = chat.name.charAt(0).toUpperCase();
        div.innerHTML = `
          <div class="chat-avatar">${initial}</div>
          <div class="chat-info">
            <div class="chat-name">${escapeHtml(chat.name)}</div>
            <div class="chat-preview">Tap to chat</div>
          </div>
        `;
        div.addEventListener('click', () => selectChatUser(chat.email, chat.name));
        container.appendChild(div);
      }
    }
    
    // Search user by email
    async function searchUser() {
      const searchInput = document.getElementById('searchEmailInput');
      const queryEmail = searchInput.value.trim().toLowerCase();
      if (!queryEmail) return;
      if (queryEmail === currentUserEmail) {
        alert("You cannot chat with yourself");
        return;
      }
      
      const usersRef = collection(db, "users");
      const q = query(usersRef, where("email", "==", queryEmail));
      const snapshot = await getDocs(q);
      
      const resultDiv = document.getElementById('searchResult');
      const resultInfo = document.getElementById('searchUserInfo');
      const addBtn = document.getElementById('addChatBtn');
      
      if (snapshot.empty) {
        resultInfo.innerText = `❌ No user found with email: ${queryEmail}`;
        addBtn.style.display = 'none';
        resultDiv.classList.add('show');
        return;
      }
      
      const userDoc = snapshot.docs[0];
      const userData = userDoc.data();
      resultInfo.innerText = `👤 ${userData.name || userData.email}`;
      addBtn.style.display = 'block';
      addBtn.onclick = () => startNewChat(userData.email, userData.name || userData.email.split('@')[0]);
      resultDiv.classList.add('show');
    }
    
    async function startNewChat(email, name) {
      if (email === currentUserEmail) return;
      
      // Check if chat already exists in user_chats
      const userChatsRef = collection(db, "user_chats");
      const existingQuery = query(userChatsRef, where("participants", "array-contains", currentUserEmail));
      const existingSnap = await getDocs(existingQuery);
      let alreadyExists = false;
      existingSnap.forEach(docSnap => {
        const parts = docSnap.data().participants;
        if (parts.includes(email)) alreadyExists = true;
      });
      
      if (!alreadyExists) {
        // Create chat record for both users
        await addDoc(collection(db, "user_chats"), {
          participants: [currentUserEmail, email],
          otherName: name,
          createdAt: Date.now()
        });
      }
      
      // Clear search
      document.getElementById('searchEmailInput').value = '';
      document.getElementById('searchResult').classList.remove('show');
      
      // Reload chats and select the new one
      await loadMyChats();
      selectChatUser(email, name);
    }
    
    function selectChatUser(email, name) {
      if (selectedUserEmail === email) return;
      if (unsubscribeMessages) unsubscribeMessages();
      if (unsubscribeTyping) unsubscribeTyping();
      
      selectedUserEmail = email;
      selectedUserName = name;
      
      // Update UI active state
      loadMyChats();
      document.getElementById('chatTargetName').innerText = name;
      document.getElementById('chatStatus').innerHTML = '🟢 Connected • real-time';
      document.getElementById('messageInputField').disabled = false;
      loadMessagesRealtime();
      listenTypingIndicator();
    }
    
    function getChatRoomId(userA, userB) {
      return [userA, userB].sort().join('_');
    }
    
    async function sendMessageHandler() {
      const input = document.getElementById('messageInputField');
      const text = input.value.trim();
      if (!text || !selectedUserEmail || !currentUserEmail) return;
      
      const chatRoomId = getChatRoomId(currentUserEmail, selectedUserEmail);
      const messagesRef = collection(db, "chats", chatRoomId, "messages");
      await addDoc(messagesRef, {
        text: text,
        sender: currentUserEmail,
        seen: false,
        timestamp: Date.now()
      });
      input.value = '';
      scrollChatBottom();
      
      // Ensure chat is registered in user_chats
      const userChatsRef = collection(db, "user_chats");
      const checkQuery = query(userChatsRef, where("participants", "array-contains", currentUserEmail));
      const snap = await getDocs(checkQuery);
      let found = false;
      snap.forEach(d => { if (d.data().participants.includes(selectedUserEmail)) found = true; });
      if (!found) {
        await addDoc(collection(db, "user_chats"), {
          participants: [currentUserEmail, selectedUserEmail],
          otherName: selectedUserName,
          createdAt: Date.now()
        });
        loadMyChats();
      }
    }
    
    function loadMessagesRealtime() {
      if (!selectedUserEmail || !currentUserEmail) return;
      const chatRoomId = getChatRoomId(currentUserEmail, selectedUserEmail);
      const q = query(collection(db, "chats", chatRoomId, "messages"), orderBy("timestamp", "asc"));
      unsubscribeMessages = onSnapshot(q, (snapshot) => {
        const msgPanel = document.getElementById('chatMessagesPanel');
        if (!msgPanel) return;
        msgPanel.innerHTML = '';
        if (snapshot.empty) {
          msgPanel.innerHTML = '<div class="empty-chat" style="text-align:center;color:#8da3cf;margin-top:40px;">✨ Send a message to start the conversation</div>';
        } else {
          snapshot.forEach(docSnap => {
            const msg = docSnap.data();
            const isMine = msg.sender === currentUserEmail;
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = `bubble ${isMine ? 'bubble-mine' : 'bubble-other'}`;
            bubbleDiv.innerHTML = `<div>${escapeHtml(msg.text)}</div>`;
            if (isMine) {
              const seenSpan = document.createElement('div');
              seenSpan.className = 'seen-indicator';
              seenSpan.innerHTML = msg.seen ? '✔✔ Seen' : '✔ Sent';
              bubbleDiv.appendChild(seenSpan);
            } else {
              if (!msg.seen) {
                updateDoc(docSnap.ref, { seen: true }).catch(console.warn);
              }
            }
            msgPanel.appendChild(bubbleDiv);
          });
        }
        scrollChatBottom();
      });
    }
    
    function handleTyping() {
      if (!selectedUserEmail || !currentUserEmail) return;
      const chatRoomId = getChatRoomId(currentUserEmail, selectedUserEmail);
      const docId = `${chatRoomId}_${currentUserEmail}`;
      setDoc(doc(db, "typing_indicators", docId), {
        user: currentUserEmail,
        chatId: chatRoomId,
        timestamp: Date.now()
      }).catch(console.warn);
      if (typingTimeout) clearTimeout(typingTimeout);
      typingTimeout = setTimeout(async () => {
        await deleteDoc(doc(db, "typing_indicators", docId)).catch(()=>{});
      }, 1500);
    }
    
    function listenTypingIndicator() {
      if (!selectedUserEmail || !currentUserEmail) return;
      const chatRoomId = getChatRoomId(currentUserEmail, selectedUserEmail);
      const typingQuery = query(collection(db, "typing_indicators"), where("chatId", "==", chatRoomId));
      unsubscribeTyping = onSnapshot(typingQuery, (snap) => {
        let isTyping = false;
        snap.forEach(docSnap => {
          const data = docSnap.data();
          if (data.user !== currentUserEmail && (Date.now() - data.timestamp) < 2000) {
            isTyping = true;
          }
        });
        const typingDiv = document.getElementById('typingIndicatorArea');
        if (typingDiv) {
          typingDiv.innerHTML = isTyping ? `✍️ ${selectedUserName || 'Someone'} is typing...` : '';
        }
      });
    }
    
    function scrollChatBottom() {
      setTimeout(() => {
        const panel = document.getElementById('chatMessagesPanel');
        if (panel) panel.scrollTop = panel.scrollHeight;
      }, 80);
    }
    
    function escapeHtml(str) { 
      if(!str) return '';
      return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    function renderApp() {
      root.innerHTML = `
        <div class="app-container">
          <div class="glass-app">
            <div class="sidebar-modern">
              <div class="sidebar-header">
                <h2>Chatter</h2>
                <div class="user-badge"><span class="material-symbols-rounded" style="font-size:18px;">account_circle</span> ${escapeHtml(currentUserEmail || 'user')}</div>
                <button id="logoutBtn" style="background: none; border:1px solid rgba(255,255,255,0.3); margin-top:12px; padding:6px 14px; border-radius:40px; color:#ddd; cursor:pointer; font-size:12px;">🚪 Logout</button>
              </div>
              <div class="search-section">
                <div class="search-box">
                  <input type="text" id="searchEmailInput" placeholder="🔍 Search by email... e.g., friend@gmail.com">
                  <button id="searchUserBtn" class="search-btn">Find</button>
                </div>
                <div id="searchResult" class="search-result">
                  <span id="searchUserInfo" class="search-user-info"></span>
                  <button id="addChatBtn" class="add-chat-btn">+ Chat</button>
                </div>
              </div>
              <div class="chats-list" id="chatsListContainer">
                <div class="empty-chats">✨ Your conversations appear here</div>
              </div>
            </div>
            <div class="chat-master">
              <div class="chat-header-gloss">
                <h3 id="chatTargetName">✨ Select a chat</h3>
                <p id="chatStatus">No conversation selected</p>
              </div>
              <div class="messages-area" id="chatMessagesPanel">
                <div class="empty-chat" style="text-align:center;color:#8da3cf;margin-top:40px;">💬 Choose a chat or search for a user</div>
              </div>
              <div id="typingIndicatorArea" class="typing-status"></div>
              <div class="input-bar">
                <input type="text" id="messageInputField" class="input-message" placeholder="Type a message..." autocomplete="off" disabled>
                <button id="sendMsgBtn" class="send-btn"><span class="material-symbols-rounded">send</span></button>
              </div>
            </div>
          </div>
        </div>
      `;
      
      document.getElementById('logoutBtn')?.addEventListener('click', async () => { await signOut(auth); });
      document.getElementById('sendMsgBtn')?.addEventListener('click', () => sendMessageHandler());
      document.getElementById('searchUserBtn')?.addEventListener('click', () => searchUser());
      const inputField = document.getElementById('messageInputField');
      inputField?.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessageHandler(); });
      inputField?.addEventListener('input', () => handleTyping());
      
      loadMyChats();
    }
    
    // Auth observer
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUserEmail = user.email;
        currentUserId = user.uid;
        await ensureUserDoc(user);
        renderApp();
      } else {
        if (unsubscribeMessages) unsubscribeMessages();
        if (unsubscribeTyping) unsubscribeTyping();
        currentUserEmail = null;
        selectedUserEmail = null;
        renderAuthPage();
      }
    });
    
    if (!firebaseReady) {
      renderAuthPage();
      showAuthMsg("⚠️ Configure Firebase credentials (apiKey, authDomain, projectId)");
    } else {
      renderAuthPage();
    }
  </script>
</body>
</html>
