<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GlanceChat — Modern Messenger</title>
  <!-- Google Fonts & Simple Icons (Material Symbols) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 20% 30%, #0b1120, #030712);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    /* ----- GLASS AUTH PANEL (ULTRA SMOOTH) ----- */
    .auth-container {
      width: 100%;
      max-width: 460px;
      padding: 24px;
      animation: fadeSlideUp 0.65s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .glass-auth {
      background: rgba(18, 25, 45, 0.65);
      backdrop-filter: blur(18px);
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 0.5px rgba(255, 255, 255, 0.1) inset;
      padding: 2.2rem 2rem;
      transition: transform 0.2s;
    }

    .glass-auth h2 {
      font-size: 2rem;
      font-weight: 600;
      background: linear-gradient(135deg, #FFFFFF, #b9c8ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      margin-bottom: 0.5rem;
    }

    .welcome-sub {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 2rem;
      font-weight: 400;
    }

    .input-group {
      margin-bottom: 1.2rem;
    }

    .glass-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 14px 18px;
      border-radius: 1.5rem;
      font-size: 1rem;
      color: white;
      font-weight: 500;
      transition: all 0.25s;
      outline: none;
      backdrop-filter: blur(4px);
    }

    .glass-input:focus {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.15);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
    }

    .glass-input::placeholder {
      color: #7f8ea3;
      font-weight: 400;
    }

    .btn-group {
      display: flex;
      gap: 14px;
      margin-top: 28px;
    }

    .btn-primary, .btn-secondary {
      flex: 1;
      padding: 12px 0;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.95rem;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .btn-primary {
      background: linear-gradient(105deg, #3b82f6, #2563eb);
      color: white;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(4px);
      color: #e2e8f0;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    /* ----- MAIN APP (GLASS UI) ----- */
    .app-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .glass-app {
      width: 1300px;
      max-width: 98vw;
      height: 90vh;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      overflow: hidden;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4);
      transition: all 0.2s;
    }

    /* Sidebar modern */
    .sidebar-modern {
      width: 300px;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      padding: 20px 0;
    }

    .sidebar-header {
      padding: 0 20px 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 18px;
    }

    .sidebar-header h2 {
      color: white;
      font-weight: 600;
      font-size: 1.6rem;
      background: linear-gradient(120deg, #fff, #9bbaff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .user-badge {
      font-size: 0.8rem;
      color: #a0c4ff;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .users-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .user-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(2px);
      padding: 14px 16px;
      border-radius: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      color: #f0f3fa;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-card:hover {
      background: rgba(59, 130, 246, 0.25);
      border-color: rgba(59, 130, 246, 0.6);
      transform: translateX(4px);
    }

    .user-card.active-chat {
      background: linear-gradient(95deg, #2563eb40, #3b82f620);
      border-left: 3px solid #3b82f6;
    }

    .avatar-placeholder {
      width: 38px;
      height: 38px;
      background: linear-gradient(145deg, #3b82f6, #1e40af);
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      text-transform: uppercase;
      color: white;
    }

    /* Chat section */
    .chat-master {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header-gloss {
      padding: 18px 24px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .chat-header-gloss h3 {
      color: white;
      font-weight: 600;
      font-size: 1.35rem;
    }

    .chat-header-gloss p {
      color: #8ca3cf;
      font-size: 0.75rem;
    }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    .bubble {
      max-width: 70%;
      padding: 10px 16px;
      border-radius: 24px;
      font-size: 0.95rem;
      line-height: 1.4;
      position: relative;
      animation: fadeInMsg 0.2s ease;
      word-wrap: break-word;
    }

    .bubble-mine {
      background: linear-gradient(115deg, #3b82f6, #2563eb);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 6px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
    }

    .bubble-other {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      color: #f1f5f9;
      align-self: flex-start;
      border-bottom-left-radius: 6px;
      border: 0.5px solid rgba(255,255,255,0.2);
    }

    .seen-indicator {
      font-size: 0.7rem;
      margin-top: 4px;
      text-align: right;
      letter-spacing: 0.5px;
      opacity: 0.8;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
    }

    .typing-status {
      padding: 6px 24px;
      font-size: 0.75rem;
      color: #a5b9e8;
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-bar {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
      padding: 16px 20px;
      display: flex;
      gap: 12px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .input-message {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 2.5rem;
      padding: 12px 20px;
      color: white;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s;
    }

    .input-message:focus {
      background: rgba(255,255,255,0.18);
      border-color: #3b82f6;
    }

    .send-btn {
      background: #3b82f6;
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      color: white;
    }

    .send-btn:hover {
      background: #2563eb;
      transform: scale(1.02);
    }

    /* scroll */
    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: #3b82f680;
      border-radius: 10px;
    }

    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(18px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInMsg {
      from { opacity: 0; transform: translateY(8px);}
      to { opacity: 1; transform: translateY(0);}
    }

    .empty-chat {
      text-align: center;
      color: #8da3cf;
      margin-top: 40px;
      font-weight: 400;
    }

    @media (max-width: 700px) {
      .sidebar-modern { width: 240px; }
      .bubble { max-width: 85%; }
    }
  </style>
</head>
<body>
  <!-- DYNAMIC RENDER BY JS -->
  <div id="root"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, doc, getDocs, addDoc, query, orderBy, onSnapshot, updateDoc, setDoc, getDoc, deleteDoc, where, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 🔥 FIREBASE CONFIG (place your real config below)
    const firebaseConfig = {
      apiKey: "AIzaSyBXKKQZTCJpurD9oVkdCvFElAgXwaL2hsc",
      authDomain: "chat-app-665ba.firebaseapp.com",
      projectId: "chat-app-665ba",
      storageBucket: "your-project.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abc123"
    };
    
    // ----------------- IMPORTANT -----------------
    // FOR DEMO PURPOSE, you MUST replace with YOUR firebase config.
    // This code is fully functional once valid config added.
    // To avoid errors, we check if config seems valid, else show warning.
    // -------------------------------------------------
    
    let app, auth, db;
    let firebaseReady = false;
    try {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      firebaseReady = true;
    } catch(e) { console.warn(e); }
    
    // State
    let currentUserEmail = null;
    let selectedUserEmail = null;
    let selectedUserName = null;
    let usersCache = []; // { email, name }
    let typingTimeout = null;
    let unsubscribeMessages = null;
    let unsubscribeTyping = null;
    
    // DOM elements root
    const root = document.getElementById('root');
    
    function renderAuthPage() {
      root.innerHTML = `
        <div class="auth-container">
          <div class="glass-auth">
            <h2>✨ GlanceChat</h2>
            <div class="welcome-sub">Ultra-smooth • Glassmorphic • Real-time</div>
            <div class="input-group"><input type="email" id="authEmail" class="glass-input" placeholder="Email address" autocomplete="email"></div>
            <div class="input-group"><input type="password" id="authPassword" class="glass-input" placeholder="Password" autocomplete="current-password"></div>
            <div class="btn-group">
              <button class="btn-primary" id="loginBtn">Login →</button>
              <button class="btn-secondary" id="signupBtn">Sign up</button>
            </div>
            <div id="authMessage" style="color:#f97316; font-size:0.8rem; margin-top:18px; text-align:center;"></div>
          </div>
        </div>
      `;
      document.getElementById('loginBtn')?.addEventListener('click', () => handleAuth('login'));
      document.getElementById('signupBtn')?.addEventListener('click', () => handleAuth('signup'));
    }
    
    async function handleAuth(type) {
      if (!firebaseReady) { showAuthMsg("⚠️ Firebase config missing — add your own keys in code."); return; }
      const email = document.getElementById('authEmail').value.trim();
      const pwd = document.getElementById('authPassword').value;
      if (!email || !pwd) { showAuthMsg("Email & password required"); return; }
      try {
        if (type === 'signup') {
          const cred = await createUserWithEmailAndPassword(auth, email, pwd);
          // store user display name (use email prefix)
          const displayName = email.split('@')[0];
          await setDoc(doc(db, "users", cred.user.uid), { email: cred.user.email, name: displayName, uid: cred.user.uid });
          showAuthMsg("✅ Signup success! Logging in...");
          await signInWithEmailAndPassword(auth, email, pwd);
        } else {
          await signInWithEmailAndPassword(auth, email, pwd);
        }
      } catch (err) {
        showAuthMsg(err.message);
      }
    }
    
    function showAuthMsg(msg) {
      const el = document.getElementById('authMessage');
      if (el) el.innerText = msg;
    }
    
    // ---------- APP RENDER ----------
    function renderApp() {
      root.innerHTML = `
        <div class="app-container">
          <div class="glass-app">
            <div class="sidebar-modern">
              <div class="sidebar-header">
                <h2>Chatter</h2>
                <div class="user-badge"><span class="material-symbols-rounded" style="font-size:18px;">account_circle</span> <span id="currentUserEmailDisplay">${currentUserEmail || 'user'}</span></div>
                <button id="logoutBtn" style="background: none; border:1px solid rgba(255,255,255,0.3); margin-top:12px; padding:6px 14px; border-radius:40px; color:#ddd; cursor:pointer; font-size:12px;">🚪 Logout</button>
              </div>
              <div class="users-list" id="usersListContainer">
                <div style="color:#aaa; text-align:center; padding:20px;">Loading contacts...</div>
              </div>
            </div>
            <div class="chat-master">
              <div class="chat-header-gloss" id="chatHeaderDynamic">
                <h3 id="chatTargetName">✨ Select a friend</h3>
                <p id="chatStatus">Tap user to start conversation</p>
              </div>
              <div class="messages-area" id="chatMessagesPanel">
                <div class="empty-chat">💬 No conversation yet</div>
              </div>
              <div id="typingIndicatorArea" class="typing-status"></div>
              <div class="input-bar">
                <input type="text" id="messageInputField" class="input-message" placeholder="Type a message..." autocomplete="off">
                <button id="sendMsgBtn" class="send-btn"><span class="material-symbols-rounded">send</span></button>
              </div>
            </div>
          </div>
        </div>
      `;
      
      document.getElementById('logoutBtn')?.addEventListener('click', async () => { await signOut(auth); });
      document.getElementById('sendMsgBtn')?.addEventListener('click', () => sendMessageHandler());
      const inputField = document.getElementById('messageInputField');
      inputField?.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessageHandler(); });
      inputField?.addEventListener('input', () => handleTyping());
      
      loadUsersList();
    }
    
    // load users from firestore "users" collection
    async function loadUsersList() {
      if (!db || !currentUserEmail) return;
      const container = document.getElementById('usersListContainer');
      try {
        const usersSnap = await getDocs(collection(db, "users"));
        const list = [];
        usersSnap.forEach(docSnap => {
          const data = docSnap.data();
          if (data.email && data.email !== currentUserEmail) {
            list.push({ email: data.email, name: data.name || data.email.split('@')[0] });
          }
        });
        usersCache = list;
        if (list.length === 0) {
          container.innerHTML = `<div style="color:#aaa; text-align:center; padding:20px;">✨ No other users yet</div>`;
          return;
        }
        container.innerHTML = '';
        list.forEach(user => {
          const div = document.createElement('div');
          div.className = `user-card ${selectedUserEmail === user.email ? 'active-chat' : ''}`;
          const initial = user.name.charAt(0).toUpperCase();
          div.innerHTML = `<div class="avatar-placeholder">${initial}</div><span>${user.name}</span>`;
          div.addEventListener('click', () => selectChatUser(user.email, user.name));
          container.appendChild(div);
        });
      } catch(e) { console.error(e); container.innerHTML = `<div style="color:#f88;">Error loading users</div>`; }
    }
    
    function selectChatUser(email, name) {
      if (selectedUserEmail === email) return;
      // cleanup previous listeners
      if (unsubscribeMessages) unsubscribeMessages();
      if (unsubscribeTyping) unsubscribeTyping();
      selectedUserEmail = email;
      selectedUserName = name;
      // update active style
      loadUsersList(); // re-render active highlight
      document.getElementById('chatTargetName').innerText = name;
      document.getElementById('chatStatus').innerHTML = '🟢 Online • end-to-end glam';
      loadMessagesRealtime();
      listenTypingIndicator();
    }
    
    function getChatRoomId(userA, userB) {
      return [userA, userB].sort().join('_');
    }
    
    async function sendMessageHandler() {
      const input = document.getElementById('messageInputField');
      const text = input.value.trim();
      if (!text || !selectedUserEmail || !currentUserEmail) return;
      const chatRoomId = getChatRoomId(currentUserEmail, selectedUserEmail);
      const messagesRef = collection(db, "chats", chatRoomId, "messages");
      await addDoc(messagesRef, {
        text: text,
        sender: currentUserEmail,
        seen: false,
        timestamp: Date.now()
      });
      input.value = '';
      // scroll to bottom after send
      scrollChatBottom();
    }
    
    function loadMessagesRealtime() {
      if (!selectedUserEmail || !currentUserEmail) return;
      const chatRoomId = getChatRoomId(currentUserEmail, selectedUserEmail);
      const q = query(collection(db, "chats", chatRoomId, "messages"), orderBy("timestamp", "asc"));
      unsubscribeMessages = onSnapshot(q, (snapshot) => {
        const msgPanel = document.getElementById('chatMessagesPanel');
        if (!msgPanel) return;
        msgPanel.innerHTML = '';
        if (snapshot.empty) {
          msgPanel.innerHTML = '<div class="empty-chat">✨ Say hi! Start the conversation ✨</div>';
        } else {
          snapshot.forEach(docSnap => {
            const msg = docSnap.data();
            const isMine = msg.sender === currentUserEmail;
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = `bubble ${isMine ? 'bubble-mine' : 'bubble-other'}`;
            bubbleDiv.innerHTML = `<div>${escapeHtml(msg.text)}</div>`;
            if (isMine) {
              const seenMark = msg.seen ? '✔✔ Seen' : '✔ Delivered';
              const seenSpan = document.createElement('div');
              seenSpan.className = 'seen-indicator';
              seenSpan.innerHTML = msg.seen ? '✔✔ Seen' : '✔ Sent';
              bubbleDiv.appendChild(seenSpan);
            } else {
              if (!msg.seen) {
                // mark as seen instantly
                updateDoc(docSnap.ref, { seen: true }).catch(console.warn);
              }
            }
            msgPanel.appendChild(bubbleDiv);
          });
        }
        scrollChatBottom();
      });
    }
    
    function handleTyping() {
      if (!selectedUserEmail || !currentUserEmail) return;
      const chatRoomId = getChatRoomId(currentUserEmail, selectedUserEmail);
      const typingRef = collection(db, "typing_indicators");
      const docId = `${chatRoomId}_${currentUserEmail}`;
      setDoc(doc(db, "typing_indicators", docId), {
        user: currentUserEmail,
        chatId: chatRoomId,
        timestamp: Date.now()
      }).catch(console.warn);
      if (typingTimeout) clearTimeout(typingTimeout);
      typingTimeout = setTimeout(async () => {
        await deleteDoc(doc(db, "typing_indicators", docId)).catch(()=>{});
      }, 1500);
    }
    
    function listenTypingIndicator() {
      if (!selectedUserEmail || !currentUserEmail) return;
      const chatRoomId = getChatRoomId(currentUserEmail, selectedUserEmail);
      const typingQuery = query(collection(db, "typing_indicators"), where("chatId", "==", chatRoomId));
      unsubscribeTyping = onSnapshot(typingQuery, (snap) => {
        let isTyping = false;
        snap.forEach(docSnap => {
          const data = docSnap.data();
          if (data.user !== currentUserEmail && (Date.now() - data.timestamp) < 2000) {
            isTyping = true;
          }
        });
        const typingDiv = document.getElementById('typingIndicatorArea');
        if (typingDiv) {
          typingDiv.innerHTML = isTyping ? `<span class="material-symbols-rounded" style="font-size:16px;">pending</span> ${selectedUserName || 'Someone'} is typing...` : '';
        }
      });
    }
    
    function scrollChatBottom() {
      setTimeout(() => {
        const panel = document.getElementById('chatMessagesPanel');
        if (panel) panel.scrollTop = panel.scrollHeight;
      }, 50);
    }
    
    function escapeHtml(str) { 
      if(!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if(m === '&') return '&amp;';
        if(m === '<') return '&lt;';
        if(m === '>') return '&gt;';
        return m;
      });
    }
    
    // Auth state observer
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUserEmail = user.email;
        // ensure user doc exists
        if (db) {
          const userRef = doc(db, "users", user.uid);
          const snap = await getDoc(userRef);
          if (!snap.exists()) {
            await setDoc(userRef, { email: user.email, name: user.email.split('@')[0], uid: user.uid });
          }
        }
        renderApp();
        // after render load chats data
        setTimeout(() => {
          if (selectedUserEmail === null && usersCache.length) {
            // optional
          }
        }, 300);
      } else {
        if (unsubscribeMessages) unsubscribeMessages();
        if (unsubscribeTyping) unsubscribeTyping();
        currentUserEmail = null;
        selectedUserEmail = null;
        renderAuthPage();
      }
    });
    
    // initial load
    if (!firebaseReady) {
      renderAuthPage();
      showAuthMsg("⚠️ Please configure Firebase credentials (apiKey, authDomain, projectId) inside script.");
    } else {
      renderAuthPage();
    }
  </script>
</body>
</html>
